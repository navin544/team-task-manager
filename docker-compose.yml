version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: team-task-manager-db
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: team-task-manager-api
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/team_task_manager
      MONGODB_DB_NAME: team_task_manager
      CLIENT_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: development-access-secret-should-be-overridden
      JWT_REFRESH_SECRET: development-refresh-secret-should-be-overridden
    depends_on:
      - mongo
    ports:
      - '5000:5000'
    volumes:
      - ./backend/src/uploads:/app/src/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: team-task-manager-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  mongo-data:
